<button id="open-btn" class="launcher" type="button" aria-label="Open support form"></button>

<div id="modal" class="modal">
  <div class="dialog" role="dialog" aria-modal="true" aria-label="Support request form">
    <div class="header">
      <h3 class="title">Create Support Request</h3>
      <button id="close-btn" class="close-btn" type="button" aria-label="Close">×</button>
    </div>

    <div class="form-grid">
      <div class="field">
        <label for="requester">Requester *</label>
        <input id="requester" type="text" placeholder="Nguyen Van A" />
      </div>

      <div class="field">
        <label for="phone-number">PhoneNumber *</label>
        <input id="phone-number" type="text" placeholder="0912345678" />
      </div>

      <div class="field">
        <label for="email">Email *</label>
        <input id="email" type="email" placeholder="a@gmail.com" />
      </div>

      <div class="field">
        <label for="project-id">ProjectId</label>
        <input id="project-id" type="text" placeholder="NPP" />
      </div>

      <div class="field full">
        <label for="content">Content *</label>
        <textarea id="content" placeholder="Mô tả vấn đề của bạn..."></textarea>
      </div>

      <div class="field">
        <label for="priority">Priority</label>
        <input id="priority" type="number" min="0" value="0" />
      </div>

      <div class="field full">
        <label for="attachments">Attachments (File)</label>
        <textarea id="attachments" placeholder='Dán URL file, mỗi dòng 1 file hoặc JSON array ["https://..."]'></textarea>
      </div>

      <div class="field full">
        <label for="coordinators">Coordinators</label>
        <input id="coordinators" type="text" placeholder="a@example.com,b@example.com" />
      </div>

      <div class="field full">
        <label for="email-contacts">EmailContacts</label>
        <input id="email-contacts" type="text" placeholder="a@example.com,b@example.com" />
      </div>
    </div>

    <div class="actions">
      <button id="cancel-btn" class="btn btn-secondary" type="button">Cancel</button>
      <button id="submit-btn" class="btn btn-primary" type="button">Submit</button>
    </div>
  </div>
</div>
