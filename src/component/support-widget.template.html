<button
  id="open-btn"
  class="launcher"
  type="button"
  aria-label="Open support form"
></button>

<div id="modal" class="modal">
  <div
    class="dialog"
    role="dialog"
    aria-modal="true"
    aria-label="Support request form"
  >
    <div class="header">
      <h3 class="title">Tạo yêu cầu hỗ trợ</h3>
      <button id="close-btn" class="close-btn" type="button" aria-label="Close">
        ×
      </button>
    </div>

    <div class="form-grid">
      <div class="field">
        <label for="requester"><span class="required">*</span> Họ và tên</label>
        <div class="input-wrap">
          <input id="requester" type="text" placeholder="Họ và tên" />
          <button type="button" class="btn-clear" aria-label="Xóa">×</button>
        </div>
        <p id="requester-error" class="field-error" aria-live="polite"></p>
      </div>

      <div class="field">
        <label for="phone-number"
          ><span class="required">*</span> Số điện thoại</label
        >
        <div class="input-wrap">
          <input id="phone-number" type="text" placeholder="Số điện thoại" />
          <button type="button" class="btn-clear" aria-label="Xóa">×</button>
        </div>
        <p id="phone-number-error" class="field-error" aria-live="polite"></p>
      </div>

      <div class="field full">
        <label for="email"><span class="required">*</span> Email</label>
        <div class="input-wrap">
          <input id="email" type="email" placeholder="Email" />
          <button type="button" class="btn-clear" aria-label="Xóa">×</button>
        </div>
        <p id="email-error" class="field-error" aria-live="polite"></p>
      </div>

      <div class="field full">
        <label for="content"><span class="required">*</span> Nội dung</label>
        <div class="input-wrap input-wrap--textarea">
          <textarea
            id="content"
            placeholder="Anh/Chị vui lòng nhập thông tin cần hỗ trợ"
          ></textarea>
          <button type="button" class="btn-clear" aria-label="Xóa">×</button>
        </div>
        <p id="content-error" class="field-error" aria-live="polite"></p>
      </div>

      <div class="field full">
        <label>File đính kèm</label>
        <div
          id="upload-trigger"
          class="upload-zone"
          role="button"
          tabindex="0"
          aria-label="Tải lên tệp"
        >
          <input id="file-input" type="file" multiple style="display: none" />
          <div class="upload-icon-wrapper">
            <svg
              class="upload-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
          </div>
          <div class="upload-text-container">
            <span class="upload-main-text"
              >Chọn tệp tải lên hoặc kéo thả vào đây</span
            >
            <span class="upload-sub-text"
              >Hỗ trợ dán ảnh hoặc tệp (Ctrl+V / Cmd+V) để đính kèm nhanh</span
            >
          </div>
        </div>
        <div id="file-list" class="file-list"></div>
      </div>
    </div>

    <div id="preview-overlay" class="preview-overlay">
      <div
        class="preview-box"
        role="dialog"
        aria-modal="true"
        aria-label="Xem trước tệp"
      >
        <button
          id="preview-close"
          class="preview-close"
          type="button"
          aria-label="Đóng"
        >
          ×
        </button>
        <div id="preview-body" class="preview-body"></div>
      </div>
    </div>

    <div class="actions">
      <button id="cancel-btn" class="btn btn-secondary" type="button">
        Hủy
      </button>
      <button id="submit-btn" class="btn btn-primary" type="button">
        Tạo yêu cầu
      </button>
    </div>
  </div>
</div>

<div
  id="toast"
  class="toast"
  role="status"
  aria-live="polite"
  aria-atomic="true"
>
  <div class="toast-card">
    <div class="toast-main">
      <div class="toast-icon" aria-hidden="true">
        <svg
          class="icon-success"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <svg
          class="icon-error"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
      </div>
      <div class="toast-body">
        <h4 id="toast-title" class="toast-title"></h4>
        <p id="toast-message" class="toast-message"></p>
      </div>
      <div class="toast-close-wrapper">
        <svg
          class="toast-countdown-ring"
          width="36"
          height="36"
          viewBox="0 0 36 36"
        >
          <circle
            class="ring-track"
            cx="18"
            cy="18"
            r="15"
            fill="none"
            stroke="#e2e8f0"
            stroke-width="2.5"
          ></circle>
          <circle
            id="toast-countdown-bar"
            class="ring-bar"
            cx="18"
            cy="18"
            r="15"
            fill="none"
            stroke="var(--toast-status-color)"
            stroke-width="2.5"
            stroke-dasharray="94.25"
            stroke-dashoffset="0"
            transform="rotate(-90 18 18)"
          ></circle>
        </svg>
        <button
          id="toast-close-btn"
          class="toast-close-btn"
          type="button"
          aria-label="Đóng thông báo"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </div>
    <div id="toast-details" class="toast-details is-hidden">
      <div class="toast-detail-row">
        <span class="toast-detail-label">Mã hỗ trợ</span>
        <div class="toast-detail-value-wrap">
          <span
            id="toast-request-code"
            class="toast-detail-value toast-detail-code"
          ></span>
          <button
            id="toast-copy-code-btn"
            class="toast-copy-btn"
            type="button"
            title="Sao chép mã hỗ trợ"
          >
            <svg
              class="icon-copy"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path
                d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
              ></path>
            </svg>
            <svg
              class="icon-copied is-hidden"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </button>
        </div>
      </div>
      <div id="toast-link-row" class="toast-detail-row is-hidden">
        <span class="toast-detail-label">Tra cứu</span>
        <div class="toast-detail-value-wrap">
          <a
            id="toast-link"
            class="toast-detail-value toast-detail-link"
            href="#"
            target="_blank"
            rel="noopener noreferrer"
          ></a>
          <button
            id="toast-copy-link-btn"
            class="toast-copy-btn"
            type="button"
            title="Sao chép liên kết"
          >
            <svg
              class="icon-copy"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path
                d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
              ></path>
            </svg>
            <svg
              class="icon-copied is-hidden"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
